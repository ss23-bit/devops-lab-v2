apiVersion: apps/v1
kind: Deployment
metadata:
  name: task-tracker-deployment
  labels:
    app: task-tracker
spec:
  replicas: 2
  selector:
    matchLabels:
      app: task-tracker
  template:
    metadata:
      labels:
        app: task-tracker
    spec:
      imagePullSecrets:
        - name: ecr-registry-key
      containers:
      - name: task-tracker
        image: 599476212560.dkr.ecr.ap-southeast-1.amazonaws.com/ss23-task-tracker:v1
        ports:
        - containerPort: 5000
        env:
        - name: APP_ENV
          value: "Development-K8s"

---

apiVersion: v1
kind: Service
metadata:
  name: task-tracker-service
spec:
  selector:
    app: task-tracker
  ports:
    - protocol: TCP
      port: 80
      targetPort: 5000
  type: NodePort
