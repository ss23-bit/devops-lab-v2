version: '3.8'

services:
  redis:
    image: redis:alpine
    container_name: redis_db
  
  app:
    build: ./app
    container_name: flask_app
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
    depends_on:
      - redis

  nginx:
    build: ./nginx
    container_name: nginx_proxy
    ports:
      - "80:80"
    depends_on:
      - app